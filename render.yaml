# Render Blueprint（無料枠）: https://dashboard.render.com/select-repo?type=blueprint
# DB は GitHub Release に保存し、起動時に DB_BACKUP_URL から復元します。
# 日次更新は GitHub Actions (.github/workflows/daily-sync-db.yml) が担当します。
services:
  - type: web
    name: japan-equity-db
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - japan-equity-db.jp
      - www.japan-equity-db.jp
    envVars:
      - key: SITE_URL
        value: https://japan-equity-db.jp
      - key: DATABASE_URL
        value: sqlite:///./data/edinet.db
      - key: COLLECTION_LOG_DIR
        value: /app/data/collection-logs
      - key: ENABLE_DAILY_CRON
        value: "false"
      - key: DB_BACKUP_URL
        value: https://github.com/takkenshiken2026-sudo/japan-equity-db.jp/releases/download/db-backup/edinet.db.gz
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
