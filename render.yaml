# Render Blueprint: https://dashboard.render.com/select-repo?type=blueprint
# 本番: UI + API + SEO + SQLite を単一サービスで提供します。
# DNS (japan-equity-db.jp) は Render のカスタムドメインに向けてください（GitHub Pages は使いません）。
services:
  - type: web
    name: japan-equity-db
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - japan-equity-db.jp
      - www.japan-equity-db.jp
    envVars:
      - key: SITE_URL
        value: https://japan-equity-db.jp
      - key: DATABASE_URL
        value: sqlite:///./data/edinet.db
      - key: COLLECTION_LOG_DIR
        value: /app/data/collection-logs
      - key: ENABLE_DAILY_CRON
        value: "true"
      - key: EDINET_API_KEY
        sync: false
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
      - key: DB_BACKUP_URL
        sync: false
    disk:
      name: edinet-data
      mountPath: /app/data
      sizeGB: 2
