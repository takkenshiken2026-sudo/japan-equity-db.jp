services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/edinet.db
      ENABLE_DAILY_CRON: "false"
      COLLECTION_LOG_DIR: /app/data/collection-logs
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
