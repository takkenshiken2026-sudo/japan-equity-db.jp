# main への push で Render 本番デプロイをトリガーします。
# 事前準備:
#   1. Render で Blueprint (render.yaml) を適用
#   2. GitHub Secrets に RENDER_DEPLOY_HOOK を設定（Render ダッシュボード → Settings → Deploy Hook）

name: Deploy Production (Render)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: render-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK が未設定です。Render の Git 連携のみでデプロイされます。"
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy triggered."
