# 本番は static-site.yml（GitHub Pages）を使用。プレビューのみ手動実行可。
name: Deploy GitHub Pages (preview only)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-japan-equity-db
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Restore database
        run: |
          mkdir -p backend/data
          if gh release view db-backup &>/dev/null; then
            gh release download db-backup -p edinet.db.gz -D /tmp
            gunzip -c /tmp/edinet.db.gz > backend/data/edinet.db
          fi
      - name: Build public_site
        env:
          SITE_URL: https://japan-equity-db.jp
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          GOOGLE_SITE_VERIFICATION_HTML: ${{ secrets.GOOGLE_SITE_VERIFICATION_HTML }}
        run: python3 tools/build_public_site.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
