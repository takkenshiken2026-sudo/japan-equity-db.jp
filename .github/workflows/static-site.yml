# 静的サイト（GitHub Pages）: DB 同期 → JSON 書き出し → デプロイ
name: Static Site

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      skip_sync:
        description: Skip daily sync (build only from Release DB)
        type: boolean
        default: false
      quick_deploy:
        description: Fast deploy — mirror live JSON and rebuild HTML only (~15 min)
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # schedule（日次フル同期）は push に打ち切られないよう別グループにする。
  # 以前は同一 group + cancel-in-progress で、長い日次ビルドが UI push に
  # キャンセルされ、株価など当日同期結果が Pages に載らないことがあった。
  group: static-site-${{ github.event_name == 'schedule' && 'schedule' || 'deploy' }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: sqlite:///./backend/data/edinet.db
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      SITE_URL: https://japan-equity-db.jp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Restore database from Release
        if: github.event_name != 'workflow_dispatch' || inputs.quick_deploy != true
        env:
          GH_TOKEN: ${{ github.token }}
          DB_BACKUP_URL: https://github.com/takkenshiken2026-sudo/japan-equity-db.jp/releases/download/db-backup/edinet.db.gz
        run: |
          mkdir -p backend/data
          if curl -fsSL -L "$DB_BACKUP_URL" -o /tmp/edinet.db.gz; then
            gunzip -c /tmp/edinet.db.gz > backend/data/edinet.db
            echo "Restored $(wc -c < backend/data/edinet.db) bytes"
          else
            echo "No db-backup release — init empty schema"
            cd backend && DATABASE_URL=sqlite:///./data/edinet.db python -m app.sync_cli init-db
          fi

      - name: Daily sync
        if: (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.skip_sync != true)) && (github.event_name != 'workflow_dispatch' || inputs.quick_deploy != true)
        run: |
          if [ -z "$EDINET_API_KEY" ]; then
            echo "::warning::EDINET_API_KEY 未設定 — sync をスキップ"
            exit 0
          fi
          cd backend
          export DATABASE_URL=sqlite:///./data/edinet.db
          python -m app.sync_cli daily-sync
          python -m app.sync_cli sync-profiles --limit 50 --workers 4 || true
          python -m app.sync_cli seed-no-xbrl-profiles || true
          python -m app.sync_cli collect-external-media --limit 120 || true
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ]; then
            python -m app.sync_cli collect-quarterly --years 2024,2025,2026 --parse-limit 1000 --parse-workers 8 || true
            python -m app.sync_cli sync-quarterly --limit 1000 --reparse-stale --workers 8 || true
          fi
          python -c "from app.db_maintenance import checkpoint_sqlite_wal; checkpoint_sqlite_wal('TRUNCATE')"

      - name: Collect JPX short-selling & backfill valuations
        # EDINET キー不要・軽量・冪等。push デプロイ時にも最新残高の取り込みと
        # 配当利回り等の再計算を行い即表示する（時系列の永続化は schedule で担保）
        if: (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.skip_sync != true)) && (github.event_name != 'workflow_dispatch' || inputs.quick_deploy != true)
        run: |
          cd backend
          export DATABASE_URL=sqlite:///./data/edinet.db
          python -m app.sync_cli collect-short-selling || echo "::warning::short-selling collection failed"
          python -m app.sync_cli backfill-quotes || echo "::warning::quote valuation backfill failed"
          python -c "from app.db_maintenance import checkpoint_sqlite_wal; checkpoint_sqlite_wal('TRUNCATE')"

      - name: Build static site
        env:
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          GOOGLE_SITE_VERIFICATION_HTML: ${{ secrets.GOOGLE_SITE_VERIFICATION_HTML }}
          # push は高速デプロイ（ライブ /data をミラー＋グローバルJSONをローカル再生成、~15分）。
          # schedule/手動フル同期のときだけ全企業エクスポート（~3時間）を行う。
          QUICK_DEPLOY: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.quick_deploy == true)) && '1' || '' }}
        run: python3 tools/build_public_site.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public_site

      # サイト成果物のアップロード後にバックアップする。
      # 以前はバックアップ失敗（Release.tag_name already exists）でビルド前に落ち、
      # 当日の株価同期結果が Pages に一切載らない状態になっていた。
      - name: Publish database backup
        if: (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.skip_sync != true)) && (github.event_name != 'workflow_dispatch' || inputs.quick_deploy != true)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -f backend/data/edinet.db ]; then
            echo "No database to publish"
            exit 0
          fi
          gzip -c backend/data/edinet.db > /tmp/edinet.db.gz
          echo "Compressed backup: $(wc -c < /tmp/edinet.db.gz) bytes"

          # view が一時失敗しても create の 422（既存タグ）でジョブ全体を落とさない
          if ! gh release view db-backup &>/dev/null; then
            gh release create db-backup \
              --title "Production DB backup" \
              --notes "Auto-updated by Static Site workflow." \
              || echo "::warning::gh release create failed (tag may already exist); continuing to upload"
          fi

          uploaded=0
          for attempt in 1 2 3 4; do
            if gh release upload db-backup /tmp/edinet.db.gz --clobber; then
              uploaded=1
              break
            fi
            echo "::warning::release upload attempt ${attempt} failed; retrying..."
            sleep $((attempt * 8))
          done
          if [ "$uploaded" != "1" ]; then
            echo "::error::Failed to upload db-backup after retries"
            exit 1
          fi
          echo "Published db-backup release asset"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
